<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASZ Etiketten-Druckstudio v2</title>
    <style>
        /* ==========================================
           BENUTZEROBERFLÄCHE (Wird nicht gedruckt)
           ========================================== */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f3f6;
            margin: 0;
            padding: 25px;
            color: #2c3e50;
        }

        .no-print-container {
            max-width: 950px;
            margin: 0 auto 30px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            color: #1a4b60;
            font-size: 1.6rem;
            border-bottom: 3px solid #6cb4db;
            padding-bottom: 8px;
            margin-bottom: 25px;
        }

        /* Modus-Umschalter (Tabs) */
        .mode-switcher {
            display: flex;
            background: #e8ecef;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .mode-tab {
            flex: 1;
            text-align: center;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #5d6d7e;
        }

        .mode-tab.active {
            background: #1a4b60;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .form-group.full-width {
                grid-column: span 1;
            }
        }

        label {
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #34495e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            color: #334155;
            background-color: #f8fafc;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6cb4db;
            background-color: #fff;
        }

        input:disabled {
            background-color: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        button {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
            box-shadow: 0 3px 8px rgba(39, 174, 96, 0.2);
        }

        .btn-primary:hover {
            background-color: #219653;
            transform: translateY(-1px);
        }

        .preview-title {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .page-container {
            background: #ffffff;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            box-shadow: 0 0 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* ==========================================
           DRUCK-RASTER & ETIKETTEN-DESIGN (Avery 27)
           ========================================== */
        .print-sheet {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            padding-top: 4.5mm;
            padding-bottom: 4.5mm;
            display: grid;
            grid-template-columns: repeat(3, 70mm);
            grid-template-rows: repeat(9, 32mm);
            background: white;
            page-break-after: always;
        }

        /* Einzelnes Etikett */
        .label {
            width: 70mm;
            height: 32mm;
            box-sizing: border-box;
            padding: 3.5mm 5mm 4mm 5mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #fff;
            border: 1px dashed #e2e8f0; /* Sichtbare Stanzkanten im Browser */
            overflow: hidden;
        }

        /* Obere Zeile (ASZ Name + Nummer) */
        .label-top {
            text-align: right;
            font-size: 11pt;
            font-weight: bold;
            color: #1a4b60;
            letter-spacing: 0.3px;
        }

        /* Mittlere Zeile (Artikelnummer + Suffix) */
        .label-middle {
            display: flex;
            align-items: baseline;
            margin-top: -1.5mm;
            margin-bottom: auto;
        }

        .label-middle .num {
            font-size: 30pt;
            font-weight: bold;
            color: #54a0cc; /* Originalgetreues helleres Blau */
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .label-middle .sep {
            font-size: 24pt;
            color: #1a4b60;
            font-weight: bold;
            margin: 0 6px;
            position: relative;
            top: -2px;
        }

        .label-middle .suffix {
            font-size: 16pt;
            font-weight: bold;
            color: #1a4b60;
        }

        /* Untere Zeile (Bezeichnung) */
        .label-bottom {
            font-size: 11.5pt;
            color: #111111;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
            letter-spacing: -0.1px;
        }

        /* Platzhalter für angebrochene Bögen */
        .label.empty {
            border: 1px dashed #f1f5f9;
            background-color: #f8fafc;
        }

        /* ==========================================
           REINE DRUCKEINSTELLUNGEN (@media print)
           ========================================== */
        @media print {
            .no-print-container, .preview-title {
                display: none !important;
            }
            body {
                background-color: #fff;
                padding: 0;
                margin: 0;
            }
            .page-container {
                box-shadow: none;
                width: auto;
                height: auto;
            }
            .label {
                border: none !important; /* Entfernt die Hilfslinien beim echten Druck */
            }
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-container">
        <h2>ASZ Etiketten-Druckstudio</h2>
        
        <div class="mode-switcher">
            <div id="tabSelect" class="mode-tab active" onclick="switchMode('select')">Sortiment-Auswahl</div>
            <div id="tabInput" class="mode-tab" onclick="switchMode('input')">Freie Eingabe (Sofort-Vorschau)</div>
        </div>
        
        <div id="sectionSelect" class="form-section active">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="sortimentSelect">Abfallart aus Sortiment wählen:</label>
                    <select id="sortimentSelect" onchange="handlePresetSelection()">
                        </select>
                </div>
            </div>
        </div>

        <div id="sectionInput" class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label for="inputArtNr">Artikel-Nr. (Mitte links):</label>
                    <input type="text" id="inputArtNr" value="4040" oninput="updatePreview()">
                </div>
                
                <div class="form-group">
                    <label for="inputSuffix">Zusatz Mitte (rechts):</label>
                    <input type="text" id="inputSuffix" value="QR-Box" oninput="updatePreview()">
                </div>

                <div class="form-group full-width">
                    <label for="inputBezeichnung">Bezeichnung unten:</label>
                    <input type="text" id="inputBezeichnung" value="Elektro-Kleingeräte (ohne Akku)" oninput="updatePreview()">
                </div>
            </div>
        </div>

        <div class="form-grid" style="border-top: 1px dashed #e2e8f0; padding-top: 20px;">
            <div class="form-group">
                <label for="inputTop">Kopfzeile (rechts):</label>
                <input type="text" id="inputTop" value="ASZ Asten · 106" oninput="updatePreview()">
            </div>

            <div class="form-group">
                <label for="inputCount">Anzahl Etiketten:</label>
                <input type="number" id="inputCount" value="9" min="1" max="27" oninput="updatePreview()">
            </div>

            <div class="form-group">
                <label for="inputStartPos">Start-Position auf Bogen (1-27):</label>
                <input type="number" id="inputStartPos" value="1" min="1" max="27" oninput="updatePreview()">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="window.print()">Jetzt Drucken (STRG + P)</button>
        </div>
    </div>

    <div class="preview-title">Live-Druckvorschau (A4-Bogen)</div>

    <div class="page-container">
        <div class="print-sheet" id="labelSheet">
            </div>
    </div>

    <script>
        // Erweitertes Sortiment mit zugewiesenen Standard-Behältern/Zusätzen ("Zusatz Mitte")
        const sortimentData = [
            { artNr: "4040", bez: "Elektro-Kleingeräte (ohne Akku)", zusatzMitte: "QR-Box" },
            { artNr: "4010", bez: "Elektro-Großgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "4020", bez: "Kühlgeräte", zusatzMitte: "Großteil" },
            { artNr: "4030", bez: "Bildschirmgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "4015", bez: "Nachtspeicheröfen", zusatzMitte: "Spezial" },
            { artNr: "4050", bez: "Gasentladungslampen", zusatzMitte: "Karton" },
            
            { artNr: "3000", bez: "Altpapier (Deinking-Qualität)", zusatzMitte: "Container" },
            { artNr: "2100", bez: "Kartonagen (ARA-lizenziert)", zusatzMitte: "Presse" },
            { artNr: "3200", bez: "Alteisen", zusatzMitte: "Mulde" },
            { artNr: "3210", bez: "Nichteisen-Metalle", zusatzMitte: "Box" },
            { artNr: "3300", bez: "Altholz", zusatzMitte: "AII-Holz" },
            { artNr: "3400", bez: "Speisefett/-öl (Haushalts-Öl)", zusatzMitte: "Fass" },
            { artNr: "3500", bez: "Altreifen", zusatzMitte: "Stapel" },
            
            { artNr: "4300", bez: "Altlacke & Werkstättenabfälle", zusatzMitte: "Gefahrgut" },
            { artNr: "4320", bez: "Altöle", zusatzMitte: "Tank" }
        ];

        let aktuellerModus = 'select'; // 'select' oder 'input'

        window.onload = function() {
            initDropdown();
            // Initialen Zustand laden
            handlePresetSelection();
        };

        // Befüllt das Dropdown-Menü
        function initDropdown() {
            const select = document.getElementById('sortimentSelect');
            select.innerHTML = '';
            
            sortimentData.forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = `[${item.artNr}] ${item.bez} → (${item.zusatzMitte})`;
                select.appendChild(opt);
            });
        }

        // Steuert das Umschalten der Bedienmodi
        function switchMode(mode) {
            aktuellerModus = mode;
            
            // UI-Tabs updaten
            document.getElementById('tabSelect').classList.toggle('active', mode === 'select');
            document.getElementById('tabInput').classList.toggle('active', mode === 'input');
            
            // Formular-Sektionen ein-/ausblenden
            document.getElementById('sectionSelect').classList.toggle('active', mode === 'select');
            document.getElementById('sectionInput').classList.toggle('active', mode === 'input');
            
            if (mode === 'select') {
                handlePresetSelection();
            } else {
                updatePreview();
            }
        }

        // Wird aufgerufen, wenn im Dropdown etwas gewählt wird
        function handlePresetSelection() {
            const select = document.getElementById('sortimentSelect');
            const index = select.value;
            
            if (index !== "" && sortimentData[index]) {
                const item = sortimentData[index];
                
                // Setze die Werte im Hintergrund auch in die Inputfelder (Synchronisation)
                document.getElementById('inputArtNr').value = item.artNr;
                document.getElementById('inputSuffix').value = item.zusatzMitte; // Zusatz Mitte automatisch!
                document.getElementById('inputBezeichnung').value = item.bez;
            }
            updatePreview();
        }

        // Hauptfunktion zur Generierung des Druckbogens (Sofort-Vorschau)
        function updatePreview() {
            const sheet = document.getElementById('labelSheet');
            sheet.innerHTML = ''; // Vorherigen Inhalt löschen

            // Werte auslesen (kommen entweder aus dem Sync der Auswahl oder direkter Eingabe)
            const topText = document.getElementById('inputTop').value;
            const artNr = document.getElementById('inputArtNr').value;
            const suffix = document.getElementById('inputSuffix').value;
            const bezeichnung = document.getElementById('inputBezeichnung').value;
            
            const count = Math.max(1, parseInt(document.getElementById('inputCount').value) || 1);
            const startPos = Math.max(1, parseInt(document.getElementById('inputStartPos').value) || 1);

            // 1. Übersprungene Etiketten (für angebrochene Bögen) generieren
            for (let i = 1; i < startPos; i++) {
                if (sheet.children.length >= 27) break;
                let emptyCell = document.createElement('div');
                emptyCell.className = 'label empty';
                sheet.appendChild(emptyCell);
            }

            // 2. Zu druckende Etiketten generieren
            for (let i = 0; i < count; i++) {
                if (sheet.children.length >= 27) break;

                let label = document.createElement('div');
                label.className = 'label';

                // Struktur exakt nach Vorgabe-Bild
                label.innerHTML = `
                    <div class="label-top">${topText}</div>
                    <div class="label-middle">
                        <span class="num">${artNr}</span>
                        <span class="sep">·</span>
                        <span class="suffix">${suffix}</span>
                    </div>
                    <div class="label-bottom" title="${bezeichnung}">${bezeichnung}</div>
                `;
                sheet.appendChild(label);
            }

            // 3. Den Rest des 27er-Rasters auffüllen
            while (sheet.children.length < 27) {
                let emptyCell = document.createElement('div');
                emptyCell.className = 'label empty';
                sheet.appendChild(emptyCell);
            }
        }
    </script>
</body>
</html>
