<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formular</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        .form-box {
            max-width: 350px;
            background: #fff;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .field-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="form-box">
    <!-- 2. Wert von "Anzahl Etiketten" auf 27 gesetzt -->
    <div class="field-group">
        <label for="anzahl-etiketten">Anzahl Etiketten</label>
        <input type="number" id="anzahl-etiketten" name="anzahl_etiketten" value="27">
    </div>

    <!-- 1. Kombinierter Button, nur noch "Fertig" -->
    <button type="submit" class="btn-submit">Fertig</button>
</div>

</body>
</html>
