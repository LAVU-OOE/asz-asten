<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASZ Asten · Terminal & Office</title>
    <link id="bootstrapCss" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ----- Senior-Friendly Accessibility Theme ----- */
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #111111;
            --text-secondary: #004085;
            --text-muted: #495057;
            --border-color: #343a40;
            --border-light: #6c757d;
            --card-active-border: #0056b3;
            --btn-success: #218838;
            --btn-danger: #c82333;
            --font-family: 'Roboto', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px;
            min-height: 100vh;
            font-size: 18px; /* Bigger default font base */
        }

        /* ----- Container Structure ----- */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 3px solid var(--border-color); /* Extra thick borders for separation */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* ----- Main Header Area ----- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--text-secondary);
            padding-bottom: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .app-title h1 {
            font-weight: 700;
            font-size: 2.2rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .app-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-indicator {
            background: #e2e3e5;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            border: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
        }
        .status-dot.offline {
            background: #dc3545;
        }

        /* ----- Main Panels Layout ----- */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 24px;
        }

        @media (max-width: 1100px) {
            .app-grid {
                grid-template-columns: 1fr; /* Stack vertically on smaller monitors */
            }
        }

        .panel {
            background: #f1f3f5;
            border: 3px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-heading {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border-light);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ----- Panel 1: Task Instructions / Cards ----- */
        .instruction-card {
            background: var(--bg-card);
            border: 3px solid var(--card-active-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-field {
            margin-bottom: 12px;
            font-size: 1.15rem;
        }
        .card-field strong {
            color: var(--text-secondary);
            display: block;
            font-size: 0.95rem;
            text-transform: uppercase;
        }
        .card-value {
            font-size: 1.5rem;
            font-weight: bold;
            background: #e9ecef;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 4px;
        }

        /* Big Chunky Navigation Buttons for Elderly Hands */
        .big-nav-btn {
            padding: 15px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            border: 3px solid var(--border-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            min-height: 54px; /* Large Target Size */
        }
        .big-nav-btn:hover { background: #e9ecef; }
        .big-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ----- Panel 2: Material Controls Selection ----- */
        .search-box {
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .list-scrollable {
            max-height: 500px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            border: 2px solid var(--border-light);
            padding: 8px;
        }

        .material-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 2px solid #dee2e6;
            gap: 10px;
        }
        .material-info {
            flex: 1;
        }
        .material-title {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .material-code-badge {
            background: #e1f5fe;
            color: #0288d1;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
        }

        /* Massive Touch Targets for Plus/Minus Buttons */
        .action-counter-btn {
            width: 54px;
            height: 54px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 50%;
            border: 3px solid var(--border-color);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-add { background: #d4edda; color: #155724; }
        .btn-add:hover { background: #c3e6cb; }
        .btn-sub { background: #f8d7da; color: #721c24; }
        .btn-sub:hover { background: #f5c6cb; }

        .counter-display {
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 36px;
            text-align: center;
        }

        /* ----- Panel 3: Receipt Box (Office Overview) ----- */
        .receipt-item {
            background: #ffffff;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-delete-row {
            background: #dc3545;
            color: white;
            border: 2px solid #721c24;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .action-row-bottom {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-global-action {
            flex: 1;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 3px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="app-title">
            <h1><i class="fa-solid4 fa-dumpster"></i> ASZ Asten Wertstoff-Terminal</h1>
        </div>
        <div class="app-status">
            <div class="status-indicator" id="networkStatus">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">System ist Bereit / Verbunden</span>
            </div>
        </div>
    </header>

    <main class="app-grid">
        
        <section class="panel">
            <h2 class="panel-heading"><i class="fa-solid fa-circle-info"></i> 1. Aktuelle Zuweisung</h2>
            <div id="cardDisplayArea">
                </div>
            <div class="d-flex justify-content-between mt-auto pt-3">
                <button class="big-nav-btn" id="btnPrevCard" onclick="changeCard(-1)">
                    <i class="fa-solid fa-arrow-left"></i> Vorherige
                </button>
                <button class="big-nav-btn" id="btnNextCard" onclick="changeCard(1)">
                    Nächste <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </section>

        <section class="panel">
            <h2 class="panel-heading"><i class="fa-solid fa-list-check"></i> 2. Menge auswählen</h2>
            <input type="text" class="search-box" id="materialSearch" placeholder="🔍 Hier tippen zum Suchen... (z.B. Holz)" oninput="filterMaterials()">
            
            <div class="list-scrollable" id="materialContainer">
                </div>
        </section>

        <section class="panel">
            <h2 class="panel-heading"><i class="fa-solid fa-file-invoice"></i> 3. Übersicht (Abgabe)</h2>
            <div class="list-scrollable flex-grow-1" id="receiptContainer">
                </div>

            <div class="action-row-bottom">
                <button class="btn-global-action" style="background: #fff3cd; color: #856404;" onclick="clearBasket()">
                    <i class="fa-solid fa-trash-can"></i> Liste leeren
                </button>
                <button class="btn-global-action" style="background: #d4edda; color: #155724;" onclick="confirmSync()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Fertig / Speichern
                </button>
            </div>
        </section>

    </main>
</div>

<script>
    // ----- Demo Seed Data Context -----
    let materials = [
        { code: "101", name: "Altholz (Möbel, Bretter)", container: "Box A" },
        { code: "102", name: "Bauschutt (Beton, Ziegel)", container: "Box B" },
        { code: "103", name: "Grünschnitt (Gartenabfälle)", container: "Platz 3" },
        { code: "104", name: "Kartonagen (Papier verpackt)", container: "Presse" },
        { code: "105", name: "Altmetall / Schrott", container: "Box C" }
    ];

    let itemsInfoCards = [
        { site: "Asten Hauptstelle", code: "H-102", container: "Zubringer West", desc: "Zuweisung für Bauschutt-Anlieferung" },
        { site: "Asten Hauptstelle", code: "G-103", container: "Grünbereich Ost", desc: "Kompostierung & Rasenschnitt" }
    ];

    let currentCardIndex = 0;
    let basket = {}; // Stores counts index mapping by code string keys

    // Initialize application layout elements
    function init() {
        renderCard();
        renderMaterialsList();
        renderReceipt();
    }

    // Handle instructions view navigation
    function renderCard() {
        const target = document.getElementById("cardDisplayArea");
        if(itemsInfoCards.length === 0) {
            target.innerHTML = `<div class="alert alert-warning">Keine Zuweisungen eingetragen.</div>`;
            return;
        }
        let data = itemsInfoCards[currentCardIndex];
        target.innerHTML = `
            <div class="instruction-card">
                <div class="card-field"><strong>📍 Standort / Ort:</strong> <span class="card-value">${data.site}</span></div>
                <div class="card-field"><strong>🔢 Code-Nummer:</strong> <span class="card-value">${data.code}</span></div>
                <div class="card-field"><strong>📦 Richtiger Behälter:</strong> <span class="card-value">${data.container}</span></div>
                <div class="card-field mt-3 text-muted"><i class="fa-solid fa-comment"></i> ${data.desc}</div>
            </div>
            <div class="text-center fw-bold text-secondary">Eintrag ${currentCardIndex + 1} von ${itemsInfoCards.length}</div>
        `;

        document.getElementById("btnPrevCard").disabled = (currentCardIndex === 0);
        document.getElementById("btnNextCard").disabled = (currentCardIndex === itemsInfoCards.length - 1);
    }

    function changeCard(step) {
        currentCardIndex += step;
        if(currentCardIndex < 0) currentCardIndex = 0;
        if(currentCardIndex >= itemsInfoCards.length) currentCardIndex = itemsInfoCards.length - 1;
        renderCard();
    }

    // Material Rendering Logic
    function renderMaterialsList(filterTerm = "") {
        const container = document.getElementById("materialContainer");
        container.innerHTML = "";
        
        let filtered = materials.filter(m => m.name.toLowerCase().includes(filterTerm.toLowerCase()) || m.code.includes(filterTerm));
        
        if(filtered.length === 0) {
            container.innerHTML = `<div class="p-3 text-center text-muted">Keine Stoffe gefunden.</div>`;
            return;
        }

        filtered.forEach(m => {
            let currentQty = basket[m.code] || 0;
            let row = document.createElement("div");
            row.className = "material-row";
            row.innerHTML = `
                <div class="material-info">
                    <span class="material-code-badge"># ${m.code}</span>
                    <div class="material-title">${m.name}</div>
                    <small class="text-muted">Zielort: ${m.container}</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button class="action-counter-btn btn-sub" onclick="updateQty('${m.code}', -1)">−</button>
                    <span class="counter-display">${currentQty}</span>
                    <button class="action-counter-btn btn-add" onclick="updateQty('${m.code}', 1)">+</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function filterMaterials() {
        let term = document.getElementById("materialSearch").value;
        renderMaterialsList(term);
    }

    function updateQty(code, adjustment) {
        let oldVal = basket[code] || 0;
        let newVal = oldVal + adjustment;
        if (newVal <= 0) {
            delete basket[code];
        } else {
            basket[code] = newVal;
        }
        // Force refresh interactive displays
        let currentSearch = document.getElementById("materialSearch").value;
        renderMaterialsList(currentSearch);
        renderReceipt();
    }

    // Render receipt logic inside panel 3
    function renderReceipt() {
        const container = document.getElementById("receiptContainer");
        container.innerHTML = "";

        let keys = Object.keys(basket);
        if(keys.length === 0) {
            container.innerHTML = `
                <div class="p-4 text-center text-muted h-100 d-flex flex-column justify-content-center align-items-center">
                    <i class="fa-solid fa-basket-shopping style="font-size: 2.5rem;" class="mb-2"></i>
                    <span>Hier wird Ihre aktuelle Auswahl angezeigt. Bitte wählen Sie links Stoffe aus.</span>
                </div>`;
            return;
        }

        keys.forEach(code => {
            let mat = materials.find(m => m.code === code);
            if(!mat) return;
            let qty = basket[code];

            let row = document.createElement("div");
            row.className = "receipt-item";
            row.innerHTML = `
                <div>
                    <strong>${mat.name}</strong><br>
                    <span class="badge bg-secondary">Menge: ${qty}x</span>
                </div>
                <button class="btn-delete-row" onclick="updateQty('${code}', -${qty})">
                    <i class="fa-solid fa-trash"></i> Löschen
                </button>
            `;
            container.appendChild(row);
        });
    }

    function clearBasket() {
        if(confirm("Möchten Sie die gesamte Liste wirklich löschen?")) {
            basket = {};
            document.getElementById("materialSearch").value = "";
            renderMaterialsList();
            renderReceipt();
        }
    }

    function confirmSync() {
        if(Object.keys(basket).length === 0) {
            alert("Ihre Liste ist leer! Bitte wählen Sie zuerst mindestens ein Material aus.");
            return;
        }
        alert("Erfolgreich gespeichert! Die Daten wurden sicher übertragen.");
        basket = {};
        renderMaterialsList();
        renderReceipt();
    }

    // Start App execution
    window.onload = init;
</script>
</body>
</html>
